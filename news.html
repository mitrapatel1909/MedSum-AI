<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedSumAI — Daily Research Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --ink: #1a1a18;
      --accent: #2d6a4f;
      --accent-light: #b7e4c7;
      --muted: #6b6b63;
      --card: #ffffff;
      --border: #ddd9d0;
      --error: #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Header — identical to index.html */
    header {
      padding: 2.5rem 3rem 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .logo { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--ink); letter-spacing: -0.02em; text-decoration: none; }
    .logo span { color: var(--accent); }
    .tagline { font-size: 0.8rem; color: var(--muted); font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.25rem; }

    nav { margin-left: auto; display: flex; gap: 1.5rem; align-items: center; }
    nav a { font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--accent); font-weight: 500; }

    /* Main content */
    main { flex: 1; max-width: 1000px; margin: 0 auto; padding: 4rem 2rem; width: 100%; position: relative; z-index: 1; }

    /* Hero */
    .hero { text-align: center; margin-bottom: 3.5rem; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.15; letter-spacing: -0.03em; margin-bottom: 1rem; color: var(--ink); }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p { font-size: 1rem; color: var(--muted); line-height: 1.7; max-width: 480px; margin: 0 auto 1.5rem; }

    /* Feed meta bar */
    .feed-meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.25rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .feed-meta-left { display: flex; align-items: center; gap: 0.75rem; }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .feed-date-label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .feed-date-value { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink); font-weight: 500; }

    .refresh-btn {
      font-size: 0.78rem; padding: 0.35rem 0.9rem;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: #f0faf4; }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .feed-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .feed-card:hover {
      border-color: var(--accent-light);
      box-shadow: 0 4px 20px rgba(45, 106, 79, 0.08);
    }

    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-emoji { font-size: 1.4rem; }

    .card-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: #e8f5ee;
      border: 1px solid var(--accent-light);
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
    }

    .card-category {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      color: var(--ink);
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }

    .card-summary {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
      margin-bottom: 1.25rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .card-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
    }

    .card-link {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    .card-link:hover { text-decoration: underline; }

    /* Loading state */
    .loading-state { text-align: center; padding: 5rem 2rem; }
    .dna-loader { display: flex; justify-content: center; gap: 5px; margin-bottom: 1.5rem; }
    .dna-loader span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: dna 1.2s ease-in-out infinite; }
    .dna-loader span:nth-child(1) { animation-delay: 0s; }
    .dna-loader span:nth-child(2) { animation-delay: 0.1s; }
    .dna-loader span:nth-child(3) { animation-delay: 0.2s; }
    .dna-loader span:nth-child(4) { animation-delay: 0.3s; }
    .dna-loader span:nth-child(5) { animation-delay: 0.4s; }
    @keyframes dna { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; } 50% { transform: translateY(-10px) scale(1.2); opacity: 1; } }
    .loading-text { font-size: 0.88rem; color: var(--muted); font-style: italic; }

    /* Error state */
    .error-state { text-align: center; padding: 5rem 2rem; }
    .error-state h3 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 0.75rem; }
    .error-state p { font-size: 0.9rem; color: var(--muted); }

    /* Footer — identical to index.html style */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* Responsive */
    @media (max-width: 900px) {
      header { padding: 1.5rem; }
      main { padding: 2.5rem 1.25rem; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
      footer { padding: 1.5rem; flex-direction: column; text-align: center; }
    }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; }
      nav { gap: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <a href="index.html" class="logo">Med<span>Sum</span>AI</a>
    <div class="tagline">Daily Research Feed</div>
  </div>
  <nav>
    <a href="index.html">Research Tool</a>
    <a href="news.html" class="active">Daily Feed</a>
  </nav>
</header>

<main>
  <div class="hero">
    <h1>Today in <em>Medicine</em></h1>
    <p>Daily AI-powered summaries across 10 medical categories, sourced from the latest PubMed research.</p>
  </div>

  <div class="feed-meta-bar">
    <div class="feed-meta-left">
      <div class="live-dot"></div>
      <span class="feed-date-label">Updated —</span>
      <span class="feed-date-value" id="feedDate">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="refreshFeed()">↻ Refresh</button>
  </div>

  <div id="feedContent">
    <div class="loading-state">
      <div class="dna-loader"><span></span><span></span><span></span><span></span><span></span></div>
      <p class="loading-text">Loading today's research digest...</p>
    </div>
  </div>
</main>

<footer>
  <div>Powered by <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank">PubMed</a> & GPT · Updated daily</div>
  <div><a href="index.html">← Back to Research Tool</a></div>
</footer>

<script>
  const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/mitrapatel1909/MedSum-AI/main/news.json';

  const categoryEmojis = {
    'Neurology': '🧠',
    'Cardiology': '❤️',
    'Infectious Disease': '🦠',
    'Cancer Research': '🧬',
    'Pharmacology': '💊',
    'Pulmonology': '🫁',
    'Orthopedics': '🦴',
    'Pediatrics': '🧒',
    'Aging & Longevity': '🧓',
    'Aging Longevity': '🧓',
    'Mental Health': '🧘',
  };

  const categoryTags = {
    'Neurology': ['Brain', 'Clinical'],
    'Cardiology': ['Heart', 'Clinical'],
    'Infectious Disease': ['Pathogens', 'Public Health'],
    'Cancer Research': ['Oncology', 'Trials'],
    'Pharmacology': ['Drugs', 'Treatment'],
    'Pulmonology': ['Lungs', 'Clinical'],
    'Orthopedics': ['Bone', 'Recovery'],
    'Pediatrics': ['Children', 'Growth'],
    'Aging & Longevity': ['Aging', 'Lifespan'],
    'Aging Longevity': ['Aging', 'Lifespan'],
    'Mental Health': ['Psychiatry', 'Brain'],
  };

  async function loadFeed() {
    try {
      const res = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      const data = await res.json();
      if (!data.categories || data.categories.length === 0) { showEmpty(); return; }
      document.getElementById('feedDate').textContent = data.date || 'Today';
      renderCards(data.categories);
    } catch (err) {
      showError();
    }
  }

  function renderCards(categories) {
    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    categories.forEach((cat, i) => {
      const card = document.createElement('div');
      card.className = 'feed-card';
      card.style.animationDelay = `${i * 0.05}s`;

      const emoji = categoryEmojis[cat.category] || '🔬';
      const tags = categoryTags[cat.category] || ['Research'];
      const pubmedSearch = `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(cat.category)}&sort=date`;
      const shortSummary = cat.summary.length > 180 ? cat.summary.substring(0, 180) + '...' : cat.summary;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-emoji">${emoji}</span>
          <span class="card-badge">PubMed</span>
        </div>
        <h3 class="card-category">${cat.category}</h3>
        <p class="card-summary">${shortSummary}</p>
        <div class="card-footer">
          <div class="card-tags">${tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
          <a href="${pubmedSearch}" target="_blank" class="card-link">Read →</a>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('feedContent').innerHTML = '';
    document.getElementById('feedContent').appendChild(grid);
  }

  function showEmpty() {
    document.getElementById('feedDate').textContent = 'Not yet generated';
    document.getElementById('feedContent').innerHTML = `
      <div class="error-state">
        <h3>No feed yet.</h3>
        <p>Run the n8n workflow to generate today's research digest.</p>
      </div>
    `;
  }

  function showError() {
    document.getElementById('feedContent').innerHTML = `
      <div class="error-state">
        <h3>Could not load feed.</h3>
        <p>Make sure news.json exists in your GitHub repo.</p>
      </div>
    `;
  }

  function refreshFeed() {
    document.getElementById('feedDate').textContent = 'Loading...';
    document.getElementById('feedContent').innerHTML = `
      <div class="loading-state">
        <div class="dna-loader"><span></span><span></span><span></span><span></span><span></span></div>
        <p class="loading-text">Refreshing...</p>
      </div>
    `;
    loadFeed();
  }

  loadFeed();
</script>
</body>
</html>
