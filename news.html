<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedSumAI — Daily Medical Research Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --ink: #1a1a18;
      --accent: #2d6a4f;
      --accent-light: #b7e4c7;
      --muted: #6b6b63;
      --card: #ffffff;
      --border: #ddd9d0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      padding: 2.5rem 3rem 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav {
      margin-left: auto;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    nav a {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--accent); }

    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .feed-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .feed-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .feed-title em {
      font-style: italic;
      color: var(--accent);
    }

    .feed-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
    }

    .feed-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .feed-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: #e8f5ee;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
    }

    .loading-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
    }

    .loading-dots {
      display: inline-flex;
      gap: 5px;
      margin-bottom: 1rem;
    }

    .loading-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(1); opacity: 0.5; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 1.5rem;
    }

    .category-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .category-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-emoji {
      font-size: 1.5rem;
      line-height: 1;
    }

    .card-category {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-summary {
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .card-articles {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .card-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .card-link:hover { text-decoration: underline; }

    .error-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
    }

    .error-state h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 1.5rem; }
      main { padding: 2rem 1rem; }
      .categories-grid { grid-template-columns: 1fr; }
      .feed-header { flex-direction: column; align-items: flex-start; }
      .feed-meta { align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Med<span>Sum</span>AI</a>
  <nav>
    <a href="index.html">Research Tool</a>
    <a href="news.html" class="active">Daily Feed</a>
    <a href="#" onclick="refreshFeed()">↻ Refresh</a>
  </nav>
</header>

<main>
  <div class="feed-header">
    <div>
      <div style="font-size:0.75rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.5rem;">Daily Research Digest</div>
      <h1 class="feed-title">Today in <em>Medicine</em></h1>
    </div>
    <div class="feed-meta">
      <div class="feed-date" id="feedDate">Loading...</div>
      <div class="feed-badge">Auto-updated</div>
    </div>
  </div>

  <div id="feedContent">
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>Loading today's research...</p>
    </div>
  </div>
</main>

<footer>
  Powered by <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank">PubMed</a> &amp; GPT-5-Mini &nbsp;·&nbsp;
  Data updated daily &nbsp;·&nbsp;
  <a href="index.html">Back to Research Tool</a>
</footer>

<script>
  const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/mitrapatel1909/MedSumAI/main/news.json';

  const categoryEmojis = {
    'Neurology': '🧠',
    'Cardiology': '❤️',
    'Infectious Disease': '🦠',
    'Cancer Research': '🧬',
    'Pharmacology': '💊',
    'Pulmonology': '🫁',
    'Orthopedics': '🦴',
    'Pediatrics': '🧒',
    'Aging & Longevity': '🧓',
    'Mental Health': '🧘',
  };

  async function loadFeed() {
    try {
      const res = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      const data = await res.json();

      if (!data.categories || data.categories.length === 0) {
        showEmpty();
        return;
      }

      document.getElementById('feedDate').textContent = data.date || 'Today';
      renderCards(data.categories);

    } catch (err) {
      showError();
    }
  }

  function renderCards(categories) {
    const grid = document.createElement('div');
    grid.className = 'categories-grid';

    categories.forEach((cat, i) => {
      const card = document.createElement('div');
      card.className = 'category-card';
      card.style.animationDelay = `${i * 0.06}s`;

      const emoji = categoryEmojis[cat.category] || '🔬';
      const pubmedSearch = `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(cat.category)}&sort=date`;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-emoji">${emoji}</span>
          <span class="card-category">${cat.category}</span>
        </div>
        <p class="card-summary">${cat.summary}</p>
        <div class="card-footer">
          <span class="card-articles">📄 Based on latest PubMed articles</span>
          <a class="card-link" href="${pubmedSearch}" target="_blank">View on PubMed →</a>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('feedContent').innerHTML = '';
    document.getElementById('feedContent').appendChild(grid);
  }

  function showEmpty() {
    document.getElementById('feedDate').textContent = 'Not yet generated';
    document.getElementById('feedContent').innerHTML = `
      <div class="error-state">
        <h3>Feed not generated yet</h3>
        <p>Run the n8n workflow to generate today's medical research digest.</p>
      </div>
    `;
  }

  function showError() {
    document.getElementById('feedContent').innerHTML = `
      <div class="error-state">
        <h3>Could not load feed</h3>
        <p>Make sure the news.json file exists in your GitHub repo.</p>
      </div>
    `;
  }

  function refreshFeed() {
    document.getElementById('feedContent').innerHTML = `
      <div class="loading-state">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p>Refreshing...</p>
      </div>
    `;
    loadFeed();
  }

  loadFeed();
</script>
</body>
</html>
